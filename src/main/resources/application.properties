# Standalone Spring Boot server configuration
server.port=8000

# The modernized application uses the Spring Data JPA repository implementation by default.
spring.profiles.default=spring-data-jpa

# Some infrastructure beans are declared by both Boot and the retained XML transaction configuration.
spring.main.allow-bean-definition-overriding=true

# Schema and sample data are initialized by the existing datasource XML configuration.
spring.sql.init.mode=never
